<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Love Letter ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

</head>


<body>


<div class="gradient-bg"></div>


<div id="hearts-container"></div>
<div id="sakura-container"></div>
<div id="sparkle-container"></div>



<!-- Music -->

<button id="musicBtn" class="music-btn">
🎵
</button>


<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>



<main class="container">


<h1 class="title">
💌 A Letter For You 💌
</h1>


<p class="subtitle">
Click the envelope ❤️
</p>



<!-- Envelope Only -->

<div id="envelope" class="envelope">


    <div class="flap"></div>

    <div class="front"></div>


</div>




<!-- Letter Separate -->

<section id="letter" class="letter">


<h2>
To My Babyyy ❤️
</h2>


<div id="typewriter" class="typewriter"></div>


<button id="loveBtn" class="love-btn">
I Love You ❤️
</button>


</section>



</main>




<!-- Popup -->

<div id="popup" class="popup">


<div class="popup-card">


<h2>
❤️
</h2>


<p>
Thank you for reading my letter, babyyy.

<br><br>

I love you forever. ❤️
</p>


<button id="closePopup">
Close
</button>


</div>


</div>




<canvas id="confetti"></canvas>



<script src="script.js"></script>


</body>
</html>
